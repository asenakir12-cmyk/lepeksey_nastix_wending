<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Свадьба Алексея и Анастасии | 20.09.2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
    --glass-bg: rgba(255, 255, 255, 0.12);
    --glass-border: rgba(255, 255, 255, 0.4);
    --accent: #d4af37;
    --dark: #1a1a1a;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #fdfcfb;
    color: #2d3436;
    overflow-x: hidden;
    margin: 0;
    padding: 0;
}

h1,h2,h3,.font-serif {
    font-family: 'Playfair Display', serif;
}
.hero-bg {
    background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('photo.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}
.fade-up-in {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}
.delay-1 { animation-delay: 0.3s; }
.delay-2 { animation-delay: 0.6s; }
.delay-3 { animation-delay: 0.9s; }
@keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
}
.glass-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.03);
}
.rings-container { position: relative; overflow: hidden; border-radius: 40px; cursor: pointer; max-height: 450px; }
.rings-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.1); transition: all 1.2s cubic-bezier(0.4,0,0.2,1); transform: scale(1.05); }
.rings-container:hover .rings-img { filter: grayscale(0%) contrast(1); transform: scale(1); }
.countdown-number { font-size: clamp(2rem,8vw,3.5rem); font-weight: 200; line-height:1; color: var(--dark); }
.countdown-label { font-size: 0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:#888; margin-top:0.5rem; }
.container-custom { max-width: 1200px; margin:0 auto; padding-left: 1.5rem; padding-right:1.5rem; }
.animate-on-scroll { opacity:0; transform: translateY(40px); transition: all 1s ease-out; }
.animate-on-scroll.visible { opacity:1; transform: translateY(0); }
.color-dot { width: 40px; height: 40px; border-radius: 50%; display:inline-block; border: 2px solid white; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
.btn-gold { background:#1a1a1a; color:white; padding: 16px 40px; border-radius: 100px; font-weight:500; letter-spacing:1px; transition: all 0.3s; display:inline-block; }
.btn-gold:hover { background: var(--accent); transform: translateY(-3px); box-shadow:0 10px 20px rgba(212,175,55,0.2); }
.rsvp-input { background:transparent; border:none; border-bottom:1px solid #ccc; padding:12px 0; width:100%; transition: border-color 0.4s; border-radius:0; }
.rsvp-input:focus { outline:none; border-bottom-color: var(--accent); }
</style>
</head>
<body>

<!-- Hero Section -->
<section class="relative h-screen flex items-center justify-center hero-bg text-white">
  <div class="text-center z-10 px-6 md:px-12 lg:px-24 container-custom">
    <p class="text-sm md:text-lg mb-4 tracking-[0.5em] uppercase font-light fade-up-in">Мы женимся</p>
    <h1 class="mb-6 font-serif italic font-light fade-up-in delay-1" style="font-size:clamp(2rem,8vw,6rem); line-height:1.1;">Алексей <span class="block md:inline">&</span> Анастасия</h1>
    <p class="text-lg md:text-2xl font-light tracking-[0.3em] fade-up-in delay-2">20 Сентября 2026</p>
    <div class="mt-12 fade-up-in delay-3">
      <a href="#rsvp" class="btn-gold uppercase text-xs md:text-sm">Подтвердить участие</a>
    </div>
  </div>
  <div class="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce opacity-40">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
    </svg>
  </div>
</section>

<!-- Остальной контент (Story, Countdown, Timeline, RSVP, Footer) остаётся без изменений -->

<script>
const weddingDate = new Date("September 20, 2026 16:00:00").getTime();
function updateCountdown() {
  const now = new Date().getTime();
  const diff = weddingDate - now;
  if(diff<0){document.getElementById("countdown").innerHTML="<p class='text-xl italic font-serif'>Этот день настал!</p>"; return;}
  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m=Math.floor((diff%(1000*60*60))/(1000*60));
  const s=Math.floor((diff%(1000*60))/1000);
  document.getElementById("days").innerText=d<10?'0'+d:d;
  document.getElementById("hours").innerText=h<10?'0'+h:h;
  document.getElementById("minutes").innerText=m<10?'0'+m:m;
  document.getElementById("seconds").innerText=s<10?'0'+s:s;
}
setInterval(updateCountdown,1000); updateCountdown();
const observer=new IntersectionObserver((entries)=>{entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('visible');}});},{threshold:0.1});
document.querySelectorAll('.animate-on-scroll').forEach(el=>observer.observe(el));
document.getElementById('weddingForm')?.addEventListener('submit',function(e){e.preventDefault(); this.style.transition='opacity 0.5s'; this.style.opacity='0'; setTimeout(()=>{this.classList.add('hidden'); document.getElementById('successMessage').classList.remove('hidden'); document.getElementById('successMessage').classList.add('fade-up-in');},500);});
window.addEventListener('scroll',()=>{const scrolled=window.pageYOffset; const hero=document.querySelector('.hero-bg'); if(window.innerWidth>768){hero.style.backgroundPositionY=-(scrolled*0.3)+'px';}});
</script>
</body>
</html>
